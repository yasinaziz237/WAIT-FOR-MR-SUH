<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flashing Image</title>

<style>
body{
    margin:0;
    background:black;
    overflow:hidden;
}

/* Image */
img{
    width:100vw;
    height:100vh;
    object-fit:cover;
}

/* Full-screen text */
#message{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
    color:white;
    font-family:Arial, sans-serif;
    font-weight:bold;
    text-align:center;
    width:100%;
    font-size:10vw;
    line-height:1.1;
    display:none;
}
</style>
</head>

<body>

<a href="https://example.com">
<img id="flashImage" src="download.jpeg">
</a>

<div id="message">WAIT FOR MR SUH</div>

<script>
let img = document.getElementById("flashImage");
let message = document.getElementById("message");

// Audio context
let audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playBeep(){
    for(let i = 0; i < 2; i++){ // double beep
        let oscillator = audioCtx.createOscillator();
        let gainNode = audioCtx.createGain();

        oscillator.type = "square"; // harsher sound
        oscillator.frequency.setValueAtTime(1000, audioCtx.currentTime);

        // MUCH louder (careful: can be very loud)
        gainNode.gain.setValueAtTime(0.9, audioCtx.currentTime);

        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        let startTime = audioCtx.currentTime + (i * 0.15);
        oscillator.start(startTime);
        oscillator.stop(startTime + 0.15);
    }
}

// Enable audio after interaction
document.body.addEventListener("click", () => {
    audioCtx.resume();
});

setInterval(() => {
    if (img.style.display === "none") {
        img.style.display = "block";
        message.style.display = "none";
        playBeep();
    } else {
        img.style.display = "none";
        message.style.display = "block";
    }
}, 2500);
</script>

</body>
</html>
